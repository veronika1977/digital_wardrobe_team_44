name: User Story
description: Creating a new user story
title: "US-XX: Short title"
labels: ["user-story"]
body:
  - type: dropdown
    id: status
    attributes:
      label: Requirement status
      options:
        - Active
        - Removed
        - Deferred
    validations:
      required: true
  - type: dropdown
    id: moscow
    attributes:
      label: MoSCoW priority
      options:
        - Must Have
        - Should Have
        - Could Have
        - Won't Have
    validations:
      required: true
  - type: input
    id: persona
    attributes:
      label: Type of user / persona
      placeholder: "As a [type of user / persona]"
    validations:
      required: true
  - type: input
    id: action
    attributes:
      label: Specific action
      placeholder: "I want to [perform a specific action]"
    validations:
      required: true
  - type: input
    id: value
    attributes:
      label: Goal or value
      placeholder: "so that [I achieve a specific goal or value]"
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes and constraints
      description: Relevant notes, constraints, assumptions, or open questions.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Define the conditions that must be met for this story to be complete.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true