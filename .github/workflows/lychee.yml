name: Lychee Link Checker

# Validates all markdown links in the repository
# Exclusions are documented and justified in: docs/lychee-exclusions.md

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'reports/**'
      - 'README.md'
      - '.lychee.toml'
      - '.github/workflows/lychee.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'reports/**'
      - 'README.md'
      - 'CHANGELOG.md'
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --exclude 'http://localhost'
            --exclude 'http://127.0.0.1'
            --exclude '^mailto:'
            --exclude 'https://.*--.*\.netlify\.app/.*'
            --exclude 'figma\.com'
            './**/*.md'
          fail: true
          failIfEmpty: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
